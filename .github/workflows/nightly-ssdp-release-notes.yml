# Nightly pipeline: Jira extract → summary HTML → Confluence publish.
#
# Required repository secrets:
#   JIRA_USERNAME, JIRA_API_TOKEN
#   CONFLUENCE_USERNAME, CONFLUENCE_API_TOKEN, CONFLUENCE_SPACE_KEY, CONFLUENCE_PARENT_PAGE_ID
#
# Optional (first-time email / SMTP in publish.py):
#   EMAIL_USERNAME, EMAIL_PASSWORD, NOTIFICATION_RECIPIENTS
#   AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID, STELLANTIS_EMAIL

name: Nightly SSDP Release Notes

on:
  schedule:
    #11:30 UTC daily — adjust as needed (cron is UTC).
    - cron: "30 11 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-ssdp-release-notes
  cancel-in-progress: false

jobs:
  run-nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run extract + summarize + publish
        run: python3 extract.py && python3 summarize.py && python3 publish.py
        env:
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NOTIFICATION_RECIPIENTS: ${{ secrets.NOTIFICATION_RECIPIENTS }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          STELLANTIS_EMAIL: ${{ secrets.STELLANTIS_EMAIL }}
